name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Get repository name
        id: repo
        run: echo "name=${{ github.event.repository.name }}" >> $GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish src/Inomatica.PersonalBlog/Inomatica.PersonalBlog.csproj
          --configuration Release
          --output publish
          -p:StaticWebAssetBasePath=/${{ steps.repo.outputs.name }}

      - name: Fix base href in index.html
        run: |
          sed -i 's|<base href="/" />|<base href="/${{ steps.repo.outputs.name }}/" />|g' publish/wwwroot/index.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Copy index.html to 404.html for SPA routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
